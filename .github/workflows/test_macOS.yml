# This workflow will build a Swift project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-swift

name: test macOS

on:
  workflow_call:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref_type != 'tag' }}

jobs:
  macos_build:
    runs-on: macos-14
    steps:
    - name: Set Xcode 15.3.0
      run: sudo xcode-select -s /Applications/Xcode_15.3.0.app/Contents/Developer
    - name: Print Current Xcode
      run: xcode-select -p
    - uses: actions/checkout@v3
    - name: Run tests with coverage
      run: swift test --enable-code-coverage
    - name: Generate lcov coverage report
      run: |
        BIN_PATH="$(swift build --show-bin-path)"
        xcrun llvm-cov export \
          -format=lcov \
          -instr-profile="$BIN_PATH/codecov/default.profdata" \
          "$BIN_PATH/SourceryPackageTests.xctest/Contents/MacOS/SourceryPackageTests" \
          > coverage.lcov
    - name: Upload coverage to Qlty
      uses: qltysh/qlty-action/coverage@v2
      with:
        token: ${{ secrets.QLTY_COVERAGE_TOKEN }}
        files: coverage.lcov

